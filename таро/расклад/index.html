        { id: 30, name: "Радуга (Семь домов)", desc: "все сферы: дом, любовь, карьера, друзья", time: "25–35 мин", price: 3300 },

        { id: 34, name: "Недельный прогноз", desc: "7 дней, ключевые события", time: "15–22 мин", price: 1900 },
        { id: 35, name: "Ремонт и недвижимость", desc: "оценка покупки или продажи жилья", time: "20–28 мин", price: 2500 },
        { id: 36, name: "Путешествие", desc: "безопасность, впечатления, удачность поездки", time: "14–20 мин", price: 1700 },
        { id: 37, name: "Исцеление (здоровье)", desc: "причины недуга и путь к ремиссии", time: "22–32 мин", price: 3000 },
        { id: 38, name: "Зеркало Архимеда", desc: "взгляд на ситуацию со стороны, нестандартное решение", time: "20–28 мин", price: 2600 },
        { id: 39, name: "Колесо года (сезонный)", desc: "12 саббатов или месяцев, природный цикл", time: "35–48 мин", price: 4300 },
        { id: 40, name: "Квадрат Юпитера", desc: "расширение влияния, социальный успех", time: "28–38 мин", price: 3800 }
    ];

    function renderSpreads() {
        const container = document.getElementById('spreadsContainer');
        if (!container) return;
        container.innerHTML = '';
        spreadsData.forEach(spread => {
            const card = document.createElement('div');
            card.className = 'tarot-card';
            card.setAttribute('data-spread-id', spread.id);
            card.setAttribute('data-spread-name', spread.name);
            card.setAttribute('data-price', spread.price);
            card.setAttribute('data-time', spread.time);

            // номер
            const numberDiv = document.createElement('div');
            numberDiv.className = 'card-number';
            numberDiv.innerText = spread.id;

            // заголовок
            const title = document.createElement('div');
            title.className = 'card-title';
            title.innerText = spread.name;

            // описание
            const desc = document.createElement('div');
            desc.className = 'card-desc';
            desc.innerText = spread.desc;

            // время
            const timeSpan = document.createElement('div');
            timeSpan.className = 'card-time';
            timeSpan.innerText = `⏱️ ${spread.time}`;

            // цена
            const priceSpan = document.createElement('div');
            priceSpan.className = 'card-price';
            priceSpan.innerHTML = `<span class="price-badge">${spread.price.toLocaleString('ru-RU')} ₽</span>`;

            // кнопка
            const btn = document.createElement('button');
            btn.className = 'choose-btn';
            btn.innerText = 'выбрать →';
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                selectSpread(spread.id, spread.name, spread.price, spread.time);
            });

            card.appendChild(numberDiv);
            card.appendChild(title);
            card.appendChild(desc);
            card.appendChild(timeSpan);
            card.appendChild(priceSpan);
            card.appendChild(btn);

            // клик по всей карточке
            card.addEventListener('click', (e) => {
                if (e.target !== btn) {
                    selectSpread(spread.id, spread.name, spread.price, spread.time);
                }
            });
            container.appendChild(card);
        });
    }

    let selectedSpread = null;
    let selectedPrice = 0;
    let selectedDuration = '';

    function selectSpread(id, name, price, duration) {
        selectedSpread = { id, name };
        selectedPrice = price;
        selectedDuration = duration;
        const toast = document.getElementById('toastMsg');
        if (toast) {
            toast.innerText = `✓ расклад №${id} «${name}» (${duration}, ${price.toLocaleString('ru-RU')}₽)`;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2200);
        }
        // визуальное выделение
        document.querySelectorAll('.tarot-card').forEach(card => {
            card.style.border = '1px solid #d9c6ae';
            card.style.background = '#faf3e8';
            card.style.backgroundImage = "repeating-linear-gradient(45deg, rgba(185, 155, 125, 0.08) 0px, rgba(185, 155, 125, 0.08) 2px, transparent 2px, transparent 8px), repeating-linear-gradient(135deg, rgba(140, 110, 80, 0.05) 0px, rgba(140, 110, 80, 0.05) 1px, transparent 1px, transparent 6px)";
        });
        const currentCard = Array.from(document.querySelectorAll('.tarot-card')).find(card => 
            card.getAttribute('data-spread-id') == id
        );
        if(currentCard) {
            currentCard.style.border = '2px solid #b77b3c';
            currentCard.style.background = '#fff6ec';
            currentCard.style.backgroundImage = "repeating-linear-gradient(45deg, rgba(185, 155, 125, 0.1) 0px, rgba(185, 155, 125, 0.1) 2px, transparent 2px, transparent 8px)";
        }
    }

    const finalBtn = document.getElementById('finalOrderBtn');
    if (finalBtn) {
        finalBtn.addEventListener('click', () => {
            if (selectedSpread) {
                const message = `Здравствуйте, Игорь! Меня зовут [твоё имя]. Мой вопрос: [опиши ситуацию]. Хочу заказать расклад №${selectedSpread.id} — «${selectedSpread.name}» (длительность ${selectedDuration}, стоимость ${selectedPrice.toLocaleString('ru-RU')}₽).`;
                navigator.clipboard.writeText(message).then(() => {
                    const toast = document.getElementById('toastMsg');
                    toast.innerText = '📜 Текст заявки скопирован! Вставь в сообщения группы.';
                    toast.classList.add('show');
                    setTimeout(() => {
                        toast.classList.remove('show');
                    }, 2500);
                }).catch(() => {
                    alert('Скопируй заявку вручную:\n' + message);
                });
                const userConfirmed = confirm(`Ты выбрал расклад «${selectedSpread.name}» (${selectedDuration}, ${selectedPrice.toLocaleString('ru-RU')}₽).\nОК — скопировать готовую заявку для отправки в ЛС.`);
                if(userConfirmed) {
                    navigator.clipboard.writeText(message).then(() => {
                        alert('✅ Заявка скопирована! Укажи своё Имя и живой вопрос, и отправь в сообщения группы.\nПосле оплаты я запишу твой персональный видео-расклад.');
                    });
                }
            } else {
                const toast = document.getElementById('toastMsg');
                toast.innerText = '🌟 Сначала выбери расклад, который откликается';
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }
        });
    }

    renderSpreads();

    setTimeout(() => {
        const tempToast = document.getElementById('toastMsg');
        if(tempToast && !selectedSpread) {
            tempToast.innerText = '🔮 нажми на любую карту — узнаешь цену и время';
            tempToast.classList.add('show');
            setTimeout(() => {
                tempToast.classList.remove('show');
            }, 2000);
        }
    }, 600);
</script>
</body>
</html>
