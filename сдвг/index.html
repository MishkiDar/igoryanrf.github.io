<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ССНО — СуперСила НейроОтличия | Дизайн-версия</title>
    <meta name="description" content="Персональный навигатор для СДВГ и нейроотличий. Инструкция к твоему мозгу.">
    <meta name="theme-color" content="#1E1B1A">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #141110 0%, #0B0A0A 100%);
            font-family: 'Inter', sans-serif;
            color: #EDE6DF;
            line-height: 1.5;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(30, 27, 26, 0.75);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 2rem;
            border: 1px solid rgba(230, 170, 120, 0.3);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
            transition: all 0.2s ease;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .header {
            background: rgba(11, 10, 10, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(230, 170, 120, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #F3C6A5, #E6A46B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .mission-btn {
            background: transparent;
            border: 1px solid rgba(230, 164, 107, 0.6);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            font-weight: 500;
            cursor: pointer;
            color: #F3C6A5;
            transition: all 0.2s;
            font-family: inherit;
        }

        .mission-btn:hover {
            background: rgba(230, 164, 107, 0.15);
            border-color: #E6A46B;
        }

        .btn-choice, .btn-primary, .btn-outline {
            border: none;
            border-radius: 60px;
            padding: 0.9rem 1.2rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            width: 100%;
        }

        .btn-choice {
            background: rgba(45, 40, 38, 0.9);
            color: #F0E2D6;
            border: 1px solid rgba(230, 164, 107, 0.3);
        }

        .btn-choice:hover {
            background: rgba(230, 164, 107, 0.2);
            border-color: #E6A46B;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(95deg, #D98E4A, #C16A2E);
            color: #1C1816;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(193, 106, 46, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(230, 164, 107, 0.7);
            color: #E6A46B;
        }

        .btn-outline:hover {
            background: rgba(230, 164, 107, 0.1);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }

        .chip {
            background: rgba(230, 164, 107, 0.2);
            padding: 0.3rem 1rem;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #F3C6A5;
            display: inline-block;
            margin-bottom: 1rem;
            letter-spacing: 0.3px;
        }

        .rec-box {
            background: rgba(25, 22, 21, 0.7);
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin: 1rem 0;
            border-left: 3px solid #E6A46B;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(230, 164, 107, 0.3);
            border-radius: 10px;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #E6A46B;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 6px #E6A46B;
        }

        .footer-nav {
            background: rgba(11, 10, 10, 0.9);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(230, 170, 120, 0.25);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem 1rem;
            position: sticky;
            bottom: 0;
            z-index: 99;
        }

        .nav-item {
            text-align: center;
            font-size: 0.75rem;
            font-weight: 500;
            color: #A68F7C;
            cursor: pointer;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            transition: 0.2s;
        }

        .nav-item.active {
            color: #E6A46B;
            background: rgba(230, 164, 107, 0.1);
        }

        .slider-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
        }

        .slider-label {
            width: 140px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
        h2 { font-size: 1.8rem; margin-bottom: 0.5rem; }

        @media (max-width: 700px) {
            .container { padding: 0 1rem; }
            h1 { font-size: 1.8rem; }
            .slider-label { width: 100%; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="container">
        <div class="header-inner">
            <div class="logo">✦ ССНО — СуперСила НейроОтличия</div>
            <button class="mission-btn" id="headerMissionBtn">ℹ️ О миссии</button>
        </div>
    </div>
</div>

<div class="container" id="appRoot" style="padding-top: 2rem; padding-bottom: 2rem; min-height: 70vh;"></div>

<div class="footer-nav" id="footerNav">
    <div class="nav-item" data-tab="home">🏠 День</div>
    <div class="nav-item" data-tab="profile">🧠 Профиль</div>
    <div class="nav-item" data-tab="guide">📘 Инструкция</div>
    <div class="nav-item" data-tab="chat">💬 Чат</div>
    <div class="nav-item" data-tab="sos">🆘 SOS</div>
</div>

<script>
    // ---------- ГЛОБАЛЬНОЕ СОСТОЯНИЕ ----------
    let currentTab = 'home';
    let user = {
        age: null,
        who: null,
        knowledge: null,
        showMission: false
    };

    let neuroProfile = {
        attention: 50,
        memory: 50,
        sensory: 50,
        emotions: 50,
        impulsivity: 50,
        organization: 50
    };

    function loadProfile() {
        const saved = localStorage.getItem('ssno_neuroprofile');
        if (saved) neuroProfile = JSON.parse(saved);
    }
    function saveProfile() {
        localStorage.setItem('ssno_neuroprofile', JSON.stringify(neuroProfile));
    }
    loadProfile();

    const appRoot = document.getElementById('appRoot');

    // ---------- ЭКРАН МИССИИ ----------
    function renderMission() {
        return `
            <div class="glass-card" style="padding: 2rem;">
                <div class="chip">🧭 Миссия</div>
                <h1>Из ада — в рай.<br>Маршрут построен</h1>
                <div class="rec-box">
                    <p style="margin-bottom: 1rem;"><strong>Это приложение не лечит. Оно даёт инструкцию к твоему мозгу.</strong></p>
                    <p>Ты устал чувствовать себя «белой вороной»?<br>Ты мама, которая срывается, а потом ненавидит себя?<br>Ты взрослый, который 40 лет не понимал, почему всё так сложно?</p>
                    <p style="margin-top: 1rem;"><strong>ССНО</strong> — твой персональный навигатор.<br>Мы не говорим «выздоравливай». Мы говорим: «Вот как работает твой мозг. А вот план — сделать жизнь легче».</p>
                    <p style="margin-top: 1rem;">Каждый нейроотличный заслуживает рай, а не ад.<br>Нажми «Начать» — построим маршрут лично для тебя.</p>
                </div>
                <button class="btn-primary" id="startFromMissionBtn">🚀 Начать — узнать свой маршрут</button>
                <button class="btn-outline" id="closeMissionBtn" style="margin-top: 0.8rem;">← Назад</button>
            </div>
        `;
    }

    // ---------- ЭКРАН ВОЗРАСТА ----------
    function renderAgeScreen() {
        return `
            <div class="glass-card" style="padding: 2rem;">
                <div class="chip">🧭 Первый шаг</div>
                <h2>Кто ты?</h2>
                <p>ССНО подстроится под твой возраст и роль.</p>
                <div class="btn-group">
                    <button class="btn-choice" data-age="schoolParent">🧒 Школьник / Родитель школьника</button>
                    <button class="btn-choice" data-age="young">🧑 До 25 лет</button>
                    <button class="btn-choice" data-age="adult">👨 Старше 25</button>
                    <button class="btn-choice" data-age="mom">🤱 Мама ребёнка с СДВГ</button>
                </div>
            </div>
        `;
    }

    // ---------- УТОЧНЕНИЕ (ШКОЛЬНИК/РОДИТЕЛЬ ИЛИ МАМА) ----------
    function renderWhoScreen() {
        if (user.age === 'schoolParent') {
            return `
                <div class="glass-card" style="padding: 2rem;">
                    <div class="chip">👥 Уточним</div>
                    <h2>Ты — школьник или родитель?</h2>
                    <div class="btn-group">
                        <button class="btn-choice" data-who="student">📚 Я сам школьник (13–17 лет)</button>
                        <button class="btn-choice" data-who="parent">👪 Я родитель школьника</button>
                    </div>
                    <button class="btn-outline" id="backToAgeBtn" style="margin-top: 1rem;">← Назад</button>
                </div>
            `;
        } else if (user.age === 'mom') {
            return `
                <div class="glass-card" style="padding: 2rem;">
                    <div class="chip">🤱 Уточним</div>
                    <h2>У тебя самой есть СДВГ?</h2>
                    <div class="btn-group">
                        <button class="btn-choice" data-who="momWithAdhd">💔 Да, у меня тоже СДВГ</button>
                        <button class="btn-choice" data-who="momNoAdhd">💪 Нет, только у ребёнка</button>
                    </div>
                    <button class="btn-outline" id="backToAgeBtn" style="margin-top: 1rem;">← Назад</button>
                </div>
            `;
        }
        return '';
    }

    // ---------- ВЫБОР ЗНАНИЯ ----------
    function renderKnowledgeScreen() {
        let roleText = "";
        if (user.age === 'schoolParent' && user.who === 'student') roleText = "школьник";
        else if (user.age === 'schoolParent' && user.who === 'parent') roleText = "родитель";
        else if (user.age === 'mom') roleText = "мама";
        else if (user.age === 'young') roleText = "молодой взрослый";
        else roleText = "взрослый";
        
        return `
            <div class="glass-card" style="padding: 2rem;">
                <div class="chip">📌 Роль: ${roleText}</div>
                <h2>Что ты знаешь про СДВГ?</h2>
                <div class="btn-group">
                    <button class="btn-choice" data-knowledge="known">✅ Я уже знаю</button>
                    <button class="btn-choice" data-knowledge="suspect">🤔 Догадываюсь</button>
                    <button class="btn-choice" data-knowledge="firstTime">❓ Первый раз слышу</button>
                </div>
                <button class="btn-outline" id="backToWhoBtn" style="margin-top: 1rem;">← Назад</button>
            </div>
        `;
    }

    // ---------- ФИНАЛЬНЫЙ ЭКРАН ПОСЛЕ АНКЕТЫ ----------
    function renderFinalScreen() {
        let message = "Настрой свой нейропрофиль — получи инструкцию к жизни.";
        if (user.age === 'mom' && user.who === 'momWithAdhd') {
            message = "Мама, ты героиня. Двойная нагрузка — двойная поддержка. Настрой профиль и получи ритуалы восстановления.";
        }
        return `
            <div class="glass-card" style="padding: 2rem;">
                <div class="chip">🎯 Маршрут готов</div>
                <h2>Диагностика пройдена</h2>
                <div class="rec-box">${message}</div>
                <button class="btn-primary" id="goToProfileBtn">🧠 Перейти к профилю</button>
                <button class="btn-outline" id="resetAllBtn" style="margin-top: 1rem;">⟳ Пройти заново</button>
            </div>
        `;
    }

    // ---------- ОСНОВНЫЕ ВКЛАДКИ ----------
    function renderHome() {
        return `
            <div class="glass-card" style="padding: 2rem;">
                <div class="chip">⚡ Твой день</div>
                <h2>Привет, нейро-герой</h2>
                <p style="margin: 1rem 0;">Челлендж: сделай одно маленькое дело без самокритики.</p>
                <button class="btn-primary" id="challengeBtn">✅ +10 силы</button>
                <button class="btn-outline" id="gotoProfileFromHome" style="margin-top: 1rem;">🧠 Настроить профиль</button>
            </div>
        `;
    }

    function renderProfile() {
        return `
            <div class="glass-card" style="padding: 2rem;">
                <div class="chip">🧬 Мой нейропрофиль</div>
                <h2>Настрой свой мозг</h2>
                <div class="slider-row"><span class="slider-label">🧠 Внимание / фокус</span><input type="range" id="attention" min="0" max="100" value="${neuroProfile.attention}"></div>
                <div class="slider-row"><span class="slider-label">📝 Рабочая память</span><input type="range" id="memory" min="0" max="100" value="${neuroProfile.memory}"></div>
                <div class="slider-row"><span class="slider-label">🎧 Сенсорная чувствит.</span><input type="range" id="sensory" min="0" max="100" value="${neuroProfile.sensory}"></div>
                <div class="slider-row"><span class="slider-label">🔥 Эмоции (скорость)</span><input type="range" id="emotions" min="0" max="100" value="${neuroProfile.emotions}"></div>
                <div class="slider-row"><span class="slider-label">⚡ Импульсивность</span><input type="range" id="impulsivity" min="0" max="100" value="${neuroProfile.impulsivity}"></div>
                <div class="slider-row"><span class="slider-label">📅 Организация</span><input type="range" id="organization" min="0" max="100" value="${neuroProfile.organization}"></div>
                <button class="btn-primary" id="saveProfileBtn" style="margin-top: 1rem;">💾 Сохранить профиль</button>
            </div>
        `;
    }

    function renderGuide() {
        let advice = "";
        if (neuroProfile.memory < 40) advice += "🧠 Твоя рабочая память как кеш. Используй диктофон и визуальные таймеры.<br>";
        if (neuroProfile.sensory > 65) advice += "🎧 Сенсорная перегрузка — носи наушники и проси место у окна.<br>";
        if (neuroProfile.attention > 60) advice += "⚡ Ты способен на гиперфокус! Метод помидора — твой друг.<br>";
        if (neuroProfile.emotions > 60) advice += "🔥 Эмоции быстрые. Техника «СТОП-выдох»: задержись на 3 вдоха.<br>";
        if (!advice) advice = "✨ Твой профиль сбалансирован. Главное — не сравнивай себя с нейротипичными.";
        
        return `
            <div class="glass-card" style="padding: 2rem;">
                <div class="chip">📘 Инструкция к жизни</div>
                <h2>Твои личные правила</h2>
                <div class="rec-box">${advice}</div>
                <p style="margin-top: 0.8rem; font-size: 0.8rem; opacity: 0.7;">Советы меняются при изменении профиля.</p>
            </div>
        `;
    }

    function renderChat() {
        return `
            <div class="glass-card" style="padding: 2rem;">
                <div class="chip">💬 Клуб своих</div>
                <h2>Ты не один</h2>
                <p style="margin: 1rem 0;">Полноценный чат появится в мобильном приложении. А пока подпишись на наш Telegram-канал.</p>
                <button class="btn-outline" id="previewChatBtn">📢 Написать в общий чат (демо)</button>
            </div>
        `;
    }

    function renderSOS() {
        return `
            <div class="glass-card" style="padding: 2rem;">
                <div class="chip">🆘 Экстренная помощь</div>
                <h2>Перегруз? Паника?</h2>
                <div class="rec-box">
                    <strong>Дыхательная техника «4-7-8»:</strong><br>
                    Вдох на 4 секунды → задержка на 7 → выдох на 8. Повтори 4 раза.
                </div>
                <div class="rec-box">
                    <strong>Фраза для себя:</strong><br>
                    «Я не сломан. Мой мозг работает иначе. Это пройдёт через 10 минут».
                </div>
                <button class="btn-primary" id="sosBtn">😮‍💨 Запустить таймер дыхания</button>
            </div>
        `;
    }

    // ---------- ГЛАВНЫЙ РЕНДЕР С ЛОГИКОЙ ----------
    function render() {
        // Миссия
        if (user.showMission) {
            appRoot.innerHTML = renderMission();
            document.getElementById('startFromMissionBtn')?.addEventListener('click', () => {
                user.showMission = false;
                render();
            });
            document.getElementById('closeMissionBtn')?.addEventListener('click', () => {
                user.showMission = false;
                render();
            });
            return;
        }

        // Анкета: возраст
        if (!user.age) {
            appRoot.innerHTML = renderAgeScreen();
            document.querySelectorAll('[data-age]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    user.age = e.target.getAttribute('data-age');
                    render();
                });
            });
            return;
        }

        // Анкета: уточнение (школьник/родитель или мама)
        if ((user.age === 'schoolParent' || user.age === 'mom') && !user.who) {
            appRoot.innerHTML = renderWhoScreen();
            document.querySelectorAll('[data-who]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    user.who = e.target.getAttribute('data-who');
                    render();
                });
            });
            const backBtn = document.getElementById('backToAgeBtn');
            if (backBtn) {
                backBtn.addEventListener('click', () => {
                    user.age = null;
                    render();
                });
            }
            return;
        }

        // Анкета: знание
        if (user.age && (!user.knowledge && (user.who !== null || (user.age !== 'schoolParent' && user.age !== 'mom')))) {
            // Если возраст young/adult — сразу знание, без who
            if ((user.age === 'young' || user.age === 'adult') && !user.knowledge) {
                appRoot.innerHTML = renderKnowledgeScreen();
                document.querySelectorAll('[data-knowledge]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        user.knowledge = e.target.getAttribute('data-knowledge');
                        render();
                    });
                });
                const backBtn = document.getElementById('backToWhoBtn');
                if (backBtn) {
                    backBtn.addEventListener('click', () => {
                        user.age = null;
                        render();
                    });
                }
                return;
            }
            // Если есть who (schoolParent/mom) и нет knowledge
            if (user.who && !user.knowledge) {
                appRoot.innerHTML = renderKnowledgeScreen();
                document.querySelectorAll('[data-knowledge]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        user.knowledge = e.target.getAttribute('data-knowledge');
                        render();
                    });
                });
                const backBtn = document.getElementById('backToWhoBtn');
                if (backBtn) {
                    backBtn.addEventListener('click', () => {
                        user.who = null;
                        render();
                    });
                }
                return;
            }
        }

        // Если анкета пройдена, но не было финального экрана
        const onboarded = localStorage.getItem('ssno_onboarded');
        if (user.age && user.knowledge && !onboarded) {
            appRoot.innerHTML = renderFinalScreen();
            const goBtn = document.getElementById('goToProfileBtn');
            if (goBtn) {
                goBtn.addEventListener('click', () => {
                    localStorage.setItem('ssno_onboarded', 'true');
                    currentTab = 'profile';
                    render();
                });
            }
            const resetBtn = document.getElementById('resetAllBtn');
            if (resetBtn) {
                resetBtn.addEventListener('click', () => {
                    user = { age: null, who: null, knowledge: null, showMission: false };
                    localStorage.removeItem('ssno_onboarded');
                    render();
                });
            }
            return;
        }

        // Основные вкладки
        if (currentTab === 'home') appRoot.innerHTML = renderHome();
        else if (currentTab === 'profile') appRoot.innerHTML = renderProfile();
        else if (currentTab === 'guide') appRoot.innerHTML = renderGuide();
        else if (currentTab === 'chat') appRoot.innerHTML = renderChat();
        else if (currentTab === 'sos') appRoot.innerHTML = renderSOS();

        // Обработчики для вкладок
        const challengeBtn = document.getElementById('challengeBtn');
        if (challengeBtn) challengeBtn.onclick = () => alert("🎉 Ты сильнее, чем думаешь! +10 силы");
        
        const gotoProfile = document.getElementById('gotoProfileFromHome');
        if (gotoProfile) gotoProfile.onclick = () => { currentTab = 'profile'; render(); };
        
        const saveBtn = document.getElementById('saveProfileBtn');
        if (saveBtn) {
            saveBtn.onclick = () => {
                neuroProfile.attention = document.getElementById('attention').value;
                neuroProfile.memory = document.getElementById('memory').value;
                neuroProfile.sensory = document.getElementById('sensory').value;
                neuroProfile.emotions = document.getElementById('emotions').value;
                neuroProfile.impulsivity = document.getElementById('impulsivity').value;
                neuroProfile.organization = document.getElementById('organization').value;
                saveProfile();
                alert("Нейропрофиль сохранён! Инструкция к жизни обновлена.");
            };
        }
        
        const previewChat = document.getElementById('previewChatBtn');
        if (previewChat) previewChat.onclick = () => alert("💬 Чат-сообщество будет в мобильной версии. Подпишись на обновления!");
        
        const sosBtn = document.getElementById('sosBtn');
        if (sosBtn) sosBtn.onclick = () => alert("Дыши: вдох 4с → задержка 7с → выдох 8с. Повтори 4 раза. Ты справишься.");
    }

    // ---------- НИЖНЯЯ НАВИГАЦИЯ ----------
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
            currentTab = e.target.closest('.nav-item').getAttribute('data-tab');
            render();
        });
    });

    // ---------- КНОПКА МИССИИ В ШАПКЕ ----------
    document.getElementById('headerMissionBtn').addEventListener('click', () => {
        user.showMission = true;
        render();
    });

    // СТАРТ
    render();
</script>
</body>
</html>
